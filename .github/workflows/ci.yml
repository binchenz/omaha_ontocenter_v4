name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: Lint, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build
        run: pnpm build

      # Unit tests (*.spec.ts) are fully mocked — no database required.
      # e2e (test/**) needs a seeded DB + LLM key and is intentionally excluded.
      - name: Test
        run: pnpm test

      - name: Typecheck web
        run: pnpm --filter @omaha/web exec tsc --noEmit

      # Non-blocking: lint is reported but does not fail the build (build itself
      # has eslint.ignoreDuringBuilds). Surfaces warnings without gating merges.
      - name: Lint web
        run: pnpm --filter @omaha/web run lint
        continue-on-error: true

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build both images on a network-unrestricted runner. This also exercises
      # the runtime migration step and the prisma-CLI-in-deps requirement.
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: false
          tags: opc-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: false
          tags: opc-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

  smoke-test:
    name: Smoke test (Docker Compose stack)
    runs-on: ubuntu-latest
    # Runs after docker-build to ensure images compile before spinning up the stack.
    # If an e2e job is added later, add it to this needs list.
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Docker Compose
        working-directory: deploy
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=ci-test-password
          JWT_SECRET=ci-test-jwt-secret-for-smoke-test
          CONNECTOR_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef
          LLM_PROVIDER=deepseek
          DEEPSEEK_API_KEY=sk-fake-ci-key-not-real
          NEXT_PUBLIC_API_URL=http://localhost:3001
          EOF

      - name: Build and start Docker Compose stack
        working-directory: deploy
        run: docker compose up -d --build

      - name: Wait for API health check
        # Poll GET /health until it returns HTTP 200, timeout after 60 seconds.
        run: |
          echo "Waiting for API to become healthy..."
          timeout=60
          elapsed=0
          until curl -sf http://localhost:3001/health > /dev/null 2>&1; do
            if [ "$elapsed" -ge "$timeout" ]; then
              echo "ERROR: API did not become healthy within ${timeout}s"
              docker compose -f deploy/docker-compose.yml logs api
              exit 1
            fi
            sleep 2
            elapsed=$((elapsed + 2))
          done
          echo "API is healthy (took ~${elapsed}s)"

      - name: Initialize via setup API
        # CAVEAT: The DEEPSEEK_API_KEY in the stack is fake, so any later
        # LLM-dependent operation (chat, the separate POST /setup/test-llm probe)
        # would fail against the real DeepSeek endpoint. That is fine here:
        # POST /setup/initialize does NOT call the LLM. It only validates inputs
        # (tenantName, adminEmail, adminPassword>=6 chars, apiKey) and persists the
        # tenant, roles, admin user, and settings — so it returns 201 cleanly even
        # with a mock key. A re-run against an already-initialized stack returns 409.
        # -w writes the HTTP status on its own trailing line; we do NOT use -f here
        # so a 409 body is still captured rather than turning into a curl error.
        run: |
          response=$(curl -s -w "\n%{http_code}" -X POST http://localhost:3001/setup/initialize \
            -H "Content-Type: application/json" \
            -d '{
              "tenantName": "Demo",
              "adminEmail": "test@example.com",
              "adminPassword": "test123",
              "apiKey": "mock-key-for-ci"
            }')
          http_code=$(echo "$response" | tail -1)
          body=$(echo "$response" | sed '$d')
          echo "HTTP $http_code"
          echo "$body"
          # 201 = freshly initialized, 409 = already initialized (idempotent re-run).
          if [ "$http_code" -ne 201 ] && [ "$http_code" -ne 409 ]; then
            echo "ERROR: Expected 201 or 409, got $http_code"
            exit 1
          fi

      - name: Assert system is initialized
        run: |
          response=$(curl -sf http://localhost:3001/setup/status)
          echo "Setup status: $response"
          if echo "$response" | grep -q '"initialized":true'; then
            echo "PASS: System reports initialized:true"
          else
            echo "ERROR: Expected initialized:true, got: $response"
            exit 1
          fi

      - name: Cleanup
        if: always()
        working-directory: deploy
        run: docker compose down -v
