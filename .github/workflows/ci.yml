name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref when a new commit is pushed.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-build-test:
    name: Lint, build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Build
        run: pnpm build

      # Unit tests (*.spec.ts) are fully mocked — no database required.
      # e2e (test/**) needs a seeded DB + LLM key and is intentionally excluded.
      - name: Test
        run: pnpm test

      - name: Typecheck web
        run: pnpm --filter @omaha/web exec tsc --noEmit

      # Non-blocking: lint is reported but does not fail the build (build itself
      # has eslint.ignoreDuringBuilds). Surfaces warnings without gating merges.
      - name: Lint web
        run: pnpm --filter @omaha/web run lint
        continue-on-error: true

  docker-build:
    name: Docker images build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Build both images on a network-unrestricted runner. This also exercises
      # the runtime migration step and the prisma-CLI-in-deps requirement.
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.api
          push: false
          tags: opc-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: false
          tags: opc-web:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
